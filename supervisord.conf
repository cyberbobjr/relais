[supervisord]
logfile=./.relais/logs/supervisord.log
pidfile=./.relais/supervisord.pid
nodaemon=false

[unix_http_server]
file=./.relais/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix://./.relais/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

; priority 1 — infrastructure
[program:courier]
command=redis-server config/redis.conf
priority=1
autostart=true
autorestart=true
stdout_logfile=./.relais/logs/courier.log
redirect_stderr=true

; priority 8 — pure observers
[program:archiviste]
command=/Users/benjaminmarchand/.local/bin/uv run python archiviste/main.py
priority=8
autostart=true
autorestart=true
stdout_logfile=./.relais/logs/archiviste.log
redirect_stderr=true
environment=PYTHONUNBUFFERED="1",PYTHONPATH="/Users/benjaminmarchand/IdeaProjects/relais",RELAIS_HOME="/Users/benjaminmarchand/IdeaProjects/relais/.relais"

