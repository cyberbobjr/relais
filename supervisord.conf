[supervisord]
logfile=./.relais/logs/supervisord.log
pidfile=./.relais/supervisord.pid
nodaemon=false
environment=DEBUGPY_ENABLED="%(ENV_DEBUGPY_ENABLED)s"

[unix_http_server]
file=./.relais/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix://./.relais/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

; priority 1 — infrastructure
[program:courier]
command=redis-server %(here)s/config/redis.conf
priority=1
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
stdout_logfile=./.relais/logs/courier.log
redirect_stderr=true

; priority 8 — pure observers
[program:archiviste]
command=%(ENV_HOME)s/.local/bin/uv run python launcher.py archiviste/main.py
priority=8
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
stdout_logfile=./.relais/logs/archiviste.log
redirect_stderr=true
environment=PYTHONUNBUFFERED="1",PYTHONPATH="%(here)s",RELAIS_HOME="%(here)s/.relais",DEBUGPY_PORT="5681",DEBUGPY_WAIT="0"

