[supervisord]
logfile=./.relais/logs/supervisord.log
pidfile=./.relais/supervisord.pid
nodaemon=false

[unix_http_server]
file=./.relais/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix://./.relais/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

; priority 1 — infrastructure
[program:courier]
command=redis-server config/redis.conf
priority=1
autostart=true
autorestart=true
stdout_logfile=./.relais/logs/courier.log
redirect_stderr=true

; priority 5 — LLM proxy
[program:litellm]
command=bash -c 'set -a; source .env; set +a; exec /Users/benjaminmarchand/.local/bin/uv run --with "litellm[proxy]" --with backoff litellm --config config/litellm.yaml --port 4000'
priority=5
autostart=true
autorestart=true
stdout_logfile=./.relais/logs/litellm.log
redirect_stderr=true

; priority 8 — pure observers
[program:archiviste]
command=/Users/benjaminmarchand/.local/bin/uv run python archiviste/main.py
priority=8
autostart=true
autorestart=true
stdout_logfile=./.relais/logs/archiviste.log
redirect_stderr=true
environment=PYTHONUNBUFFERED="1",PYTHONPATH="/Users/benjaminmarchand/IdeaProjects/relais"

; priority 10 — core bricks
[program:portail]
command=/Users/benjaminmarchand/.local/bin/uv run python portail/main.py
priority=10
autostart=true
autorestart=true
stdout_logfile=./.relais/logs/portail.log
redirect_stderr=true
environment=PYTHONUNBUFFERED="1",PYTHONPATH="/Users/benjaminmarchand/IdeaProjects/relais"

