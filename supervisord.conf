; priority 5 — WhatsApp Baileys gateway (external Node.js service)
[program:baileys-api]
command=%(ENV_HOME)s/.local/bin/uv run python scripts/run_baileys.py
directory=%(here)s
priority=5
autostart=false
autorestart=true
stopasgroup=true
killasgroup=true
stdout_logfile=./.relais/logs/baileys-api.log
redirect_stderr=true
environment=PYTHONUNBUFFERED="1",PYTHONPATH="%(here)s",RELAIS_HOME="%(here)s/.relais",REDIS_URL="redis://baileys:%(ENV_REDIS_PASS_BAILEYS)s@localhost:6379",PORT="3025",NODE_ENV="production"

; Groups
[group:core]
programs=portail,sentinelle,atelier,souvenir,commandant,archiviste,forgeron,horloger

[group:relays]
programs=aiguilleur

[group:infra]
programs=courier

[group:optional]
programs=baileys-api
