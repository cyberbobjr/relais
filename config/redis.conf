# Project-local Redis socket setup
port 0
unixsocket ./.relais/redis.sock
unixsocketperm 770
requirepass xxx

# ACL per brick (Passes are provided as environment variables or set in .env)
user aiguilleur  on >pass_aiguilleur ~relais:messages:* ~relais:active_sessions:* ~relais:logs &relais:streaming:start:* +@all
user portail     on >pass_portail ~relais:messages:* ~relais:security ~relais:tasks ~relais:active_sessions:* ~relais:state:* ~relais:logs +@all
user sentinelle  on >pass_sentinelle ~relais:security ~relais:core ~relais:tasks ~relais:commands ~relais:messages:outgoing_pending ~relais:messages:outgoing:* ~relais:admin:* ~relais:logs +@all
user atelier     on >pass_atelier ~relais:tasks ~relais:tasks:* ~relais:generations ~relais:memory:* ~relais:events:* ~relais:messages:outgoing_pending ~relais:messages:outgoing:* ~relais:messages:streaming:* ~relais:logs &relais:streaming:start:* +@all
user souvenir    on >pass_souvenir ~relais:memory:* ~relais:generations ~relais:messages:* ~relais:messages:outgoing:* ~relais:sessions:* ~relais:context:* ~relais:logs +@all
user commandant  on >pass_commandant ~relais:commands ~relais:messages:outgoing:* ~relais:memory:request ~relais:state:* ~relais:logs +@all
user archiviste  on >pass_archiviste ~relais:logs ~relais:events:* ~relais:messages:* ~relais:security ~relais:tasks ~relais:tasks:* ~relais:core +@all
user default    off
