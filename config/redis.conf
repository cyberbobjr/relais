# Project-local Redis socket setup
port 0
unixsocket ./.relais/redis.sock
unixsocketperm 770
requirepass xxx

# ACL per brick (Passes are provided as environment variables or set in .env)
user aiguilleur  on >pass_aiguilleur ~relais:messages:* ~relais:active_sessions:* ~relais:logs &relais:streaming:start:* +@all
user portail     on >pass_portail ~relais:messages:* ~relais:security ~relais:tasks ~relais:active_sessions:* ~relais:logs +@all
user sentinelle  on >pass_sentinelle ~relais:security ~relais:core ~relais:tasks ~relais:logs +@all
user atelier     on >pass_atelier ~relais:tasks ~relais:generations ~relais:memory:* ~relais:events:* ~relais:messages:outgoing:* ~relais:messages:streaming:* ~relais:logs &relais:streaming:start:* +@all
user souvenir    on >pass_souvenir ~relais:memory:* ~relais:generations ~relais:messages:* ~relais:messages:outgoing:* ~relais:sessions:* ~relais:context:* ~relais:logs +@all
user scheduler   on >pass_scheduler ~relais:tasks ~relais:push:* ~relais:logs +@all
user herald      on >pass_herald ~relais:push:* ~relais:notifications:* ~relais:active_sessions:* ~relais:messages:* +@all
user learner     on >pass_learner ~relais:skills:* ~relais:logs +@all
user archiviste  on >pass_archiviste ~relais:logs ~relais:events:* ~relais:messages:* ~relais:security ~relais:tasks ~relais:core +@all
user warden      on >pass_warden ~relais:admin:* ~relais:push:* ~relais:logs +@all
user intake      on >pass_intake ~relais:push:* ~relais:webhooks:* +@all
user inspector   on >pass_inspector ~relais:events:* ~relais:logs +@all
user weaver      on >pass_weaver ~relais:events:* ~relais:logs +@all
user default    off
