# Project-local Redis socket setup
# TCP port is required by baileys-api (Node.js WhatsApp gateway) which does not
# support Unix sockets. Bound to 127.0.0.1 only — never expose beyond localhost.
# In container/VM deployments, ensure network isolation (no port forwarding for 6379).
port 6379
bind 127.0.0.1
unixsocket redis.sock
dir ./.relais/
dbfilename dump.rdb
unixsocketperm 770
# WARNING: replace "xxx" with a strong random password before any deployment.
# This placeholder will cause Redis to reject all connections on a production system.
requirepass xxx

# ACL per brick (Passes are provided as environment variables or set in .env)
user aiguilleur  on >pass_aiguilleur ~relais:messages:* ~relais:active_sessions:* ~relais:whatsapp:* ~relais:commandant:query ~relais:commandant:catalog:* ~relais:logs &relais:streaming:start:* &relais:config:reload:* +@all
user portail     on >pass_portail ~relais:messages:* ~relais:security ~relais:tasks ~relais:active_sessions:* ~relais:state:* ~relais:logs +@all
user sentinelle  on >pass_sentinelle ~relais:security ~relais:core ~relais:tasks ~relais:commands ~relais:messages:outgoing_pending ~relais:messages:outgoing:* ~relais:admin:* ~relais:logs +@all
user atelier     on >pass_atelier ~relais:tasks ~relais:tasks:* ~relais:generations ~relais:memory:* ~relais:events:* ~relais:messages:outgoing_pending ~relais:messages:outgoing:* ~relais:messages:streaming:* ~relais:skill:trace ~relais:atelier:control ~relais:logs &relais:streaming:start:* +@all
user forgeron    on >pass_forgeron ~relais:skill:* ~relais:events:system ~relais:memory:request ~relais:messages:outgoing_pending ~relais:logs +@all
user souvenir    on >pass_souvenir ~relais:memory:* ~relais:generations ~relais:messages:* ~relais:messages:outgoing:* ~relais:sessions:* ~relais:context:* ~relais:logs +@all
user commandant  on >pass_commandant ~relais:commands ~relais:tasks ~relais:messages:outgoing:* ~relais:memory:request ~relais:whatsapp:* ~relais:state:* ~relais:atelier:control ~relais:commandant:query ~relais:commandant:catalog:* ~relais:logs +@all
user archiviste  on >pass_archiviste ~relais:logs ~relais:events:* ~relais:messages:* ~relais:security ~relais:tasks ~relais:tasks:* ~relais:core +@all
user horloger    on >pass_horloger ~relais:messages:incoming:horloger ~relais:logs &relais:config:reload:horloger +@all
# baileys-api (WhatsApp gateway) — TCP connection, restricted to its own keyspace
user baileys     on >pass_baileys ~baileys-api:* +@all
user default    off
